<nav class="navbar" [class.scrolled]="scrolled()" [class.mobile-open]="mobileOpen()">
  <div class="navbar__inner container">

    <!-- Logo -->
    <a class="navbar__logo" routerLink="/">
      <img src="assets/symax/SYMAX_white_nosub_200x72.png" alt="Symax Software Solutions" height="36">
    </a>

    <!-- Desktop links -->
    <div class="navbar__links">

      <!-- Solutions dropdown -->
      <div class="navbar__dropdown-wrap">
        <button
          class="navbar__link navbar__link--dropdown"
          [class.active]="solutionsOpen()"
          (click)="toggleSolutions($event)"
        >
          Solutions
          <svg class="navbar__chevron" [class.open]="solutionsOpen()" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="navbar__dropdown" [class.open]="solutionsOpen()">
          <!-- Racing -->
          <div class="navbar__dropdown-section-label">Racing & Events</div>
          <a class="navbar__dropdown-item" routerLink="/phoenix" (click)="solutionsOpen.set(false)">
            <div class="navbar__dropdown-name">Phoenix Timing</div>
            <div class="navbar__dropdown-desc">Cloud timing & scoring platform</div>
          </a>
          <a class="navbar__dropdown-item" href="https://race-hub.io" target="_blank" rel="noopener noreferrer" (click)="solutionsOpen.set(false)">
            <div class="navbar__dropdown-name">
              RaceHub
              <svg class="navbar__external-icon" width="11" height="11" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <path d="M4 2h6v6M10 2L4.5 7.5M9 7v3H2V3h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="navbar__dropdown-desc">Event registration platform</div>
          </a>
        </div>
      </div>

      <a class="navbar__link" routerLink="/events" data-testid="nav-portfolio">Portfolio</a>
      <a class="navbar__link" routerLink="/contact">Contact</a>
      <a class="btn btn--primary btn--sm" routerLink="/contact">Get in Touch</a>
    </div>

    <!-- Hamburger -->
    <button class="navbar__hamburger" (click)="toggleMobile()" [attr.aria-expanded]="mobileOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div class="navbar__mobile" [class.open]="mobileOpen()">
    <div class="navbar__mobile-section-label">Solutions</div>
    <a class="navbar__mobile-link" routerLink="/phoenix" (click)="closeMobile()">
      Phoenix Timing
    </a>
    <a class="navbar__mobile-link" href="https://race-hub.io" target="_blank" rel="noopener noreferrer" (click)="closeMobile()">
      RaceHub
      <svg class="navbar__external-icon" width="13" height="13" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <path d="M4 2h6v6M10 2L4.5 7.5M9 7v3H2V3h3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="navbar__mobile-divider"></div>
    <a class="navbar__mobile-link" routerLink="/events" (click)="closeMobile()" data-testid="nav-portfolio-mobile">Portfolio</a>
    <a class="navbar__mobile-link" routerLink="/contact" (click)="closeMobile()">Contact</a>
    <a class="btn btn--primary" routerLink="/contact" (click)="closeMobile()">Get in Touch</a>
  </div>
</nav>

<!-- Overlay for mobile -->
@if (mobileOpen()) {
  <div class="navbar__overlay" (click)="closeMobile()"></div>
}
