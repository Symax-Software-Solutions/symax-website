<section id="hero" class="hero">
  <div class="hero__bg">
    <img [src]="content.backgroundImage" alt="Cycling action" class="hero__bg-img" loading="eager">
    <div class="hero__overlay"></div>
    <div class="hero__overlay-gradient"></div>
  </div>

  <div class="hero__content container">
    <div class="hero__badge">
      <span>Est. 2022</span>
      <span class="hero__badge-dot"></span>
      <span>Trusted at UCI World Championships</span>
    </div>

    <h1 class="hero__headline">
      <span class="hero__headline-line">{{ content.headline }}</span>
      <span class="hero__headline-line">{{ content.headlineLine2 }}</span>
      <span class="hero__headline-line accent">{{ content.headlineLine3 }}</span>
    </h1>

    <p class="hero__subtitle">{{ content.subtitle }}</p>

    <div class="hero__actions">
      <button class="btn btn--primary" (click)="scrollTo('products')">
        {{ content.cta }}
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn btn--outline" (click)="scrollTo('portfolio')">View Portfolio</button>
    </div>

    <div class="hero__stats">
      <div class="hero__stat">
        <span class="hero__stat-value">4+</span>
        <span class="hero__stat-label">World Championships</span>
      </div>
      <div class="hero__stat-divider"></div>
      <div class="hero__stat">
        <span class="hero__stat-value">2,300+</span>
        <span class="hero__stat-label">Riders at a single event</span>
      </div>
      <div class="hero__stat-divider"></div>
      <div class="hero__stat">
        <span class="hero__stat-value">100%</span>
        <span class="hero__stat-label">Cloud-native</span>
      </div>
    </div>
  </div>

  <div class="hero__scroll-hint" (click)="scrollTo('products')">
    <span>Scroll</span>
    <div class="hero__scroll-line"></div>
  </div>
</section>
