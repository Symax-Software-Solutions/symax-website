version: '3'
services:
  directus:
    image: directus/directus:latest
    ports:
      - "8055:8055"
    environment:
      SECRET: "${DIRECTUS_SECRET:-change-me-local-secret}"
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD:-change-me-local-password}"
      PUBLIC_URL: "${DIRECTUS_PUBLIC_URL:-http://localhost:8055}"
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${DIRECTUS_CORS_ORIGIN:-https://symaxsoftware.com,https://www.symaxsoftware.com}"
    volumes:
      - directus_db:/directus/database
      - directus_uploads:/directus/uploads

volumes:
  directus_db:
  directus_uploads:
