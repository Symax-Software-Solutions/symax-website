server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # gzip on most text-y responses (saves bytes on JS/CSS/JSON/SVG)
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    application/rss+xml
    application/atom+xml
    application/manifest+json
    image/svg+xml
    font/ttf
    font/otf
    font/eot;

  # Never cache the HTML shell or runtime config — they wire users to new bundles.
  location = / {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files /index.html =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri =404;
  }

  location = /app-config.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri =404;
  }

  # Hashed Angular bundles at the root — safe to cache forever.
  # Angular's application builder emits e.g. main-5V2ILAUV.js, chunk-HVUKJRO3.js, styles-PK5CEYRQ.css
  location ~ "^/(?:main|polyfills|styles|chunk|runtime|scripts|vendor)[-.][A-Za-z0-9]{8,}\.(?:js|mjs|css|map)$" {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Static asset folder — content-hashed by build pipeline.
  # `^~` stops nginx from falling through to the regex image rule below,
  # so /assets/* keeps the 1-year immutable cache header.
  location ^~ /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Standalone media in public/ that isn't hashed — still cache for a day.
  location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg)$ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400" always;
    try_files $uri =404;
  }

  # robots.txt / sitemap.xml
  location = /robots.txt {
    add_header Cache-Control "public, max-age=3600" always;
    try_files $uri =404;
  }

  location = /sitemap.xml {
    add_header Cache-Control "public, max-age=3600" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }
}
